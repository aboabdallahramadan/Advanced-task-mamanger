# GitLab CI/CD — quality gate for TMap (web + backend publish).
#
# Model: this pipeline GATES; it does NOT deploy. Coolify is connected to this GitLab repo
# (GitLab App / project access token + webhook) and still builds the Dockerfiles and deploys
# on push to `main`. CI just proves the suites + builds are green first, exactly as the
# pre-deploy gate in docs/deploy/coolify-runbook.md used to be run by hand.
#
# Runner: GitLab.com SaaS shared runners (Docker-capable; the backend tests use Testcontainers).
# Scope: the publish targets (backend + web). The desktop/electron app is a separate release and
# is intentionally not built here.

stages:
  - test
  - verify

# Avoid duplicate pipelines: run on merge requests and on push to main (plus tags).
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_COMMIT_TAG'

# ---------------------------------------------------------------------------
# Backend: `dotnet test`. The suite uses Testcontainers (it spins a real Postgres 16),
# so it needs a Docker daemon -> the docker:dind service + the Testcontainers/Docker env.
# ---------------------------------------------------------------------------
test:backend:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:10.0
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
    # Ryuk (Testcontainers' reaper) is flaky under dind; the CI job is ephemeral so its
    # containers are torn down with the runner anyway.
    TESTCONTAINERS_RYUK_DISABLED: "true"
    # In dind, Testcontainers must reach the spun Postgres on the dind host (the `docker` service),
    # not localhost — the container's mapped port is exposed on dind, so without this the DB
    # connection times out even though the Postgres container started fine.
    TESTCONTAINERS_HOST_OVERRIDE: "docker"
    NUGET_PACKAGES: "$CI_PROJECT_DIR/.nuget"
  cache:
    key: "nuget-$CI_COMMIT_REF_SLUG"
    paths:
      - .nuget/
  script:
    - cd backend
    - dotnet test --nologo --verbosity minimal

# ---------------------------------------------------------------------------
# Frontend: client (@tmap/app) + web tests + the web typecheck/bundle.
# The committed package-lock.json records the native rollup/esbuild binaries only for the
# lockfile host's platform (win32) — an npm limitation (npm/cli#4828) — so BOTH `npm ci` AND
# `npm install` WITH that lockfile present fail on a linux runner with "Cannot find module
# @rollup/rollup-linux-x64-gnu". We delete the lockfile so npm resolves the correct linux
# binaries fresh (the same reason the web Dockerfile doesn't copy it). Only the publish
# workspaces are installed (skips the desktop/electron app for speed).
# ---------------------------------------------------------------------------
test:frontend:
  stage: test
  image: node:20
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
  cache:
    key: "npm-$CI_COMMIT_REF_SLUG"
    paths:
      - .npm/
  before_script:
    - rm -f package-lock.json
    - npm install -w @tmap/web -w @tmap/app -w @tmap/api-client --include-workspace-root --no-audit --no-fund
  script:
    - npm run test:app
    - npm test --workspace @tmap/web
    - npm run build:web

# ---------------------------------------------------------------------------
# Verify both production images build (no push — Coolify builds + deploys them). Runs on
# main only, so a broken Dockerfile is caught here instead of at the Coolify deploy.
# ---------------------------------------------------------------------------
verify:images:
  stage: verify
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
  script:
    - docker build -f backend/Dockerfile -t tmap-api:ci backend
    - docker build -f apps/web/Dockerfile --build-arg VITE_API_BASE_URL=https://api-tasks.qmindtech.net -t tmap-web:ci .
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
