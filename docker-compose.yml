services:
  postgres:
    image: postgres:16
    container_name: tmap-postgres
    environment:
      POSTGRES_USER: tmap
      POSTGRES_PASSWORD: tmap_dev_pw
      POSTGRES_DB: tmap
    ports:
      - '5432:5432'
    volumes:
      - tmap_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tmap -d tmap']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tmap_pgdata:
